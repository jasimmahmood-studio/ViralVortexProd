[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg-full", "gcc"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python3 -c \"import shutil; print('ffmpeg:', shutil.which('ffmpeg')); print('ffprobe:', shutil.which('ffprobe'))\""]

[start]
cmd = "python3 scheduler.py"
