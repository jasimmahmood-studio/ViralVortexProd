[phases.setup]
nixPkgs = ["python311", "ffmpeg-full", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python -c \"import shutil; print('ffmpeg:', shutil.which('ffmpeg')); print('ffprobe:', shutil.which('ffprobe'))\""]

[start]
cmd = "python scheduler.py"
